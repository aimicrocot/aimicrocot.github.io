<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBERSPACE_HARU // SYSTEM_ACTIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00ffe1;
            --neon-purple: #bc00ff;
            --dark-bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        /* ФОН С ГОРОДОМ */
        .main-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('bg.jpg') center/cover no-repeat;
            opacity: 0.4;
            z-index: -2;
        }

        /* ЭФФЕКТ СКАНИРОВАНИЯ (SCANLINE) */
        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 225, 0.02) 51%);
            background-size: 100% 4px;
            z-index: -1;
            pointer-events: none;
        }

        /* ШАПКА В СТИЛЕ BUNNY HARU */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            letter-spacing: 2px;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        nav a:hover {
            color: var(--neon-purple);
            text-shadow: 0 0 8px var(--neon-purple);
        }

        /* КОНТЕНТ */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 100px);
            position: relative;
        }

        /* ПЕРСОНАЖ */
        .avatar-box {
            position: relative;
            z-index: 2;
            margin-bottom: -50px; /* Прижимаем кнопки к персонажу */
        }

        .char-img {
            max-height: 60vh;
            filter: drop-shadow(0 0 15px rgba(188, 0, 255, 0.4));
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* СЕТКА КИБЕР-КНОПОК */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            z-index: 3;
            max-width: 900px;
            padding: 20px;
        }

        .cyber-btn {
            display: block;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-align: center;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s;
            box-shadow: inset 0 0 0 transparent;
        }

        .cyber-btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.05);
        }

        .btn-wide {
            grid-column: span 2;
        }

        /* ФУТЕР */
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 3px;
        }

    </style>
</head>
<body>

    <div class="main-bg"></div>
    <div class="scanlines"></div>

    <header>
        <div class="logo">.+ᕱᕱ* cyber haru!</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Prompts</a>
            <a href="#">Guides</a>
            <a href="#">Updates</a>
            <a href="#">Credits</a>
        </nav>
    </header>

    <div class="container">
        
        <div class="avatar-box">
            <img src="char.jpg" alt="Avatar" class="char-img">
        </div>

        <div class="button-grid">
            <a href="https://github.com/aimicrocot" target="_blank" class="cyber-btn">Пресет</a>
            <a href="https://github.com/aimicrocot/promting-rp-guide-sillytavern" target="_blank" class="cyber-btn btn-wide">Промтинг гайд</a>
            <a href="https://github.com/aimicrocot/Tokens-Count" target="_blank" class="cyber-btn">Токены</a>
            <a href="https://github.com/aimicrocot/Scenarios-Extension" target="_blank" class="cyber-btn">Сценарии</a>
            <a href="https://github.com/aimicrocot/Facts-Memory-Tracker" target="_blank" class="cyber-btn">Memory Tracker</a>
        </div>

    </div>

    <footer>
        [ SYSTEM VERSION 2.0.26 // CONNECTION STABLE ]
    </footer>

</body>
</html>
