<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICROCOT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --c: #00f5ff;
  --p: #ff2d78;
  --v: #b400ff;
  --bg: #020510;
  --gc: 0 0 8px #00f5ff, 0 0 24px #00f5ff44;
  --gp: 0 0 8px #ff2d78, 0 0 24px #ff2d7844;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:#c8e8ff;font-family:'Share Tech Mono',monospace}

#loader{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:30px 20px;
  transition:opacity .6s ease;
}
#loader.hide{opacity:0;pointer-events:none}
.boot-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1rem,4vw,1.6rem);
  color:var(--c);
  text-shadow:var(--gc);
  letter-spacing:.2em;
  margin-bottom:28px;
}
.boot-bar-wrap{
  width:min(400px,90vw);
  height:4px;
  background:rgba(0,245,255,.12);
  border:1px solid rgba(0,245,255,.25);
  margin-bottom:24px;
  position:relative;overflow:hidden;
}
.boot-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--v),var(--c));
  box-shadow:0 0 10px var(--c);
  width:0%;
  transition:width .05s linear;
}
.log-box{
  width:min(440px,92vw);
  height:160px;
  overflow:hidden;
  border:1px solid rgba(0,245,255,.15);
  padding:10px 14px;
  font-size:clamp(.6rem,1.4vw,.72rem);
  line-height:1.7;
  background:rgba(0,10,25,.7);
}
.log-line{opacity:0;animation:logPop .25s ease forwards}
@keyframes logPop{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.log-ok{color:var(--c)}
.log-warn{color:#ffcc00}
.log-err{color:var(--p)}
.log-sys{color:rgba(200,232,255,.45)}

#main{
  opacity:0;
  transition:opacity .7s ease;
  pointer-events:none;
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 16px 36px;
}
#main.show{opacity:1;pointer-events:auto}

.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(0,245,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,245,255,.035) 1px,transparent 1px);
  background-size:36px 36px;
  animation:gpulse 8s ease-in-out infinite;
}
@keyframes gpulse{0%,100%{opacity:1}50%{opacity:.35}}
.bg-scan{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);
}
.bg-vig{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.88) 100%);
}

/* ВОЗВРАЩЕНЫ ПАДАЮЩИЕ ЛУЧИ (STREAKS) */
.bg-streak {
  position: fixed; z-index: 0; width: 1px; opacity: 0.15;
  animation: streakFall linear infinite;
}
.bg-streak.s1 { left:8%;  height:200px; background:linear-gradient(var(--c),transparent); animation-duration:4s; animation-delay:0s; }
.bg-streak.s2 { left:23%; height:120px; background:linear-gradient(var(--p),transparent); animation-duration:6s; animation-delay:1.5s; }
.bg-streak.s3 { left:45%; height:300px; background:linear-gradient(var(--v),transparent); animation-duration:5s; animation-delay:0.7s; }
.bg-streak.s4 { left:67%; height:160px; background:linear-gradient(var(--c),transparent); animation-duration:7s; animation-delay:2s; }
.bg-streak.s5 { left:88%; height:250px; background:linear-gradient(var(--p),transparent); animation-duration:4.5s; animation-delay:0.3s; }
@keyframes streakFall {
  0%   { top: -300px; opacity: 0; }
  10%  { opacity: 0.2; }
  90%  { opacity: 0.1; }
  100% { top: 110vh; opacity: 0; }
}

header{
  position:relative;z-index:2;
  width:100%;max-width:860px;
  padding:22px 0 0;
  text-align:center;
}
.sys-bar{
  font-size:9px;color:var(--c);opacity:.45;
  letter-spacing:3px;margin-bottom:10px;
  animation:sblink 3s step-end infinite;
}
@keyframes sblink{0%,100%{opacity:.45}50%{opacity:.15}}

.logo{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2.2rem,7vw,4.6rem);
  font-weight:900;letter-spacing:.15em;
  color:var(--c);text-shadow:var(--gc);
  position:relative;display:inline-block;line-height:1;
  cursor:default;user-select:none;
}
.logo::before{
  content:'MICROCOT';position:absolute;inset:0;
  color:var(--p);text-shadow:var(--gp);
  clip-path:polygon(0 25%,100% 25%,100% 48%,0 48%);
  animation:gl1 7s infinite;
}
.logo::after{
  content:'MICROCOT';position:absolute;inset:0;
  color:var(--v);
  clip-path:polygon(0 60%,100% 60%,100% 78%,0 78%);
  animation:gl2 7s infinite;
}
@keyframes gl1{0%,90%,100%{transform:translate(0);opacity:0}91%{transform:translate(-5px,2px);opacity:.9}93%{transform:translate(5px,-1px);opacity:.9}95%{transform:translate(-2px,0);opacity:.7}97%{opacity:0}}
@keyframes gl2{0%,92%,100%{transform:translate(0);opacity:0}93%{transform:translate(4px,1px);opacity:.8}95%{transform:translate(-4px,-2px);opacity:.8}97%{transform:translate(1px,0);opacity:.5}99%{opacity:0}}

.logo-sub{
  display:block;font-family:'Share Tech Mono',monospace;
  font-size:clamp(.48rem,1.3vw,.65rem);
  color:rgba(0,245,255,.45);letter-spacing:.35em;margin-top:6px;
}

.top-strip{
  position:relative;z-index:2;
  width:100%;max-width:680px;
  margin:14px 0 8px;
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 18px;
  border:1px solid rgba(0,245,255,.18);
  background:rgba(0,15,40,.55);
  backdrop-filter:blur(8px);
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
}
.strip-item{font-size:clamp(.52rem,1.2vw,.65rem);color:rgba(0,245,255,.55);letter-spacing:.18em}
.strip-item span{color:var(--c);text-shadow:0 0 6px var(--c)44}
.strip-dot{width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:var(--gc);animation:dotpulse 1.8s ease-in-out infinite}
@keyframes dotpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.4}}

.avatar-section{position:relative;z-index:2;margin:16px 0 14px;display:flex;justify-content:center}
.avatar-wrap{position:relative;width:clamp(160px,38vw,260px);animation:bounce 3s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.avatar-glow{position:absolute;inset:-16px;border-radius:4px;background:radial-gradient(ellipse at center,rgba(0,245,255,.18) 0%,transparent 68%);animation:aglow 3s ease-in-out infinite;z-index:0}
.avatar-ring{position:absolute;inset:-3px;border-radius:2px;z-index:3;pointer-events:none;box-shadow:0 0 12px var(--c),0 0 28px rgba(0,245,255,.4),inset 0 0 12px rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.55);clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px);animation:rpulse 3s ease-in-out infinite}
@keyframes rpulse{0%,100%{box-shadow:0 0 12px var(--c),0 0 28px rgba(0,245,255,.4)}50%{box-shadow:0 0 20px var(--c),0 0 50px rgba(0,245,255,.6),0 0 80px rgba(0,245,255,.2)}}
@keyframes aglow{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:.45;transform:scale(1.06)}}

.avatar-img{width:100%;display:block;position:relative;z-index:2;filter:saturate(1.25) contrast(1.1);clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px)}
.avatar-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);z-index:4;animation:scnl 2.5s linear infinite;box-shadow:0 0 10px var(--c)}
@keyframes scnl{0%{top:0%;opacity:1}85%{opacity:.8}100%{top:100%;opacity:0}}

.corner{position:absolute;width:22px;height:22px;z-index:5}
.corner::before,.corner::after{content:'';position:absolute;background:var(--c);box-shadow:var(--gc)}
.corner.tl{top:-2px;left:-2px}.corner.tr{top:-2px;right:-2px}.corner.bl{bottom:-2px;left:-2px}.corner.br{bottom:-2px;right:-2px}
.corner.tl::before{width:2px;height:100%;top:0;left:0}.corner.tl::after{height:2px;width:100%;top:0;left:0}
.corner.tr::before{width:2px;height:100%;top:0;right:0}.corner.tr::after{height:2px;width:100%;top:0;right:0}
.corner.bl::before{width:2px;height:100%;bottom:0;left:0}.corner.bl::after{height:2px;width:100%;bottom:0;left:0}
.corner.br::before{width:2px;height:100%;bottom:0;right:0
