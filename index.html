<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MICROCOT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--c:#00f5ff;--p:#ff2d78;--v:#b400ff;--bg:#020510;--gc:0 0 8px #00f5ff,0 0 24px #00f5ff44;--gp:0 0 8px #ff2d78,0 0 24px #ff2d7844}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:#c8e8ff;font-family:'Share Tech Mono',monospace}

#loader{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;transition:opacity .6s ease}
#loader.hide{opacity:0;pointer-events:none}
.boot-title{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,4vw,1.6rem);color:var(--c);text-shadow:var(--gc);letter-spacing:.2em;margin-bottom:28px}
.boot-bar-wrap{width:min(480px,90vw);height:4px;background:rgba(0,245,255,.12);border:1px solid rgba(0,245,255,.25);margin-bottom:24px;overflow:hidden}
.boot-bar-fill{height:100%;background:linear-gradient(90deg,var(--v),var(--c));box-shadow:0 0 10px var(--c);width:0%;transition:width .4s cubic-bezier(0.4,0,0.2,1)}
.log-box{width:min(480px,90vw);height:180px;overflow:hidden;border:1px solid rgba(0,245,255,.15);padding:10px 14px;font-size:.6rem;line-height:1.7;background:rgba(0,10,25,.7)}
.log-line{opacity:0;animation:logPop .4s cubic-bezier(0.4,0,0.2,1) forwards}
@keyframes logPop{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.log-ok{color:var(--c)}.log-warn{color:#ffcc00}.log-err{color:var(--p)}.log-sys{color:rgba(200,232,255,.45)}

#main{opacity:0;transition:opacity .7s ease;pointer-events:none;position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 36px}
#main.show{opacity:1;pointer-events:auto}

.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,245,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.035) 1px,transparent 1px);background-size:36px 36px;animation:gpulse 8s ease-in-out infinite}
@keyframes gpulse{0%,100%{opacity:1}50%{opacity:.35}}
.bg-scan{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px)}
.bg-vig{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.88) 100%)}

header{position:relative;z-index:2;width:100%;max-width:860px;padding:22px 0 0;text-align:center}
.sys-bar{font-size:9px;color:var(--c);opacity:.45;letter-spacing:3px;margin-bottom:10px;animation:sblink 3s step-end infinite}
@keyframes sblink{0%,100%{opacity:.45}50%{opacity:.15}}

.logo{font-family:'Orbitron',sans-serif;font-size:clamp(2.2rem,7vw,4.6rem);font-weight:900;letter-spacing:.15em;color:var(--c);text-shadow:var(--gc);position:relative;display:inline-block;line-height:1;cursor:default;user-select:none}
.logo::before{content:'MICROCOT';position:absolute;inset:0;color:var(--p);text-shadow:var(--gp);clip-path:polygon(0 25%,100% 25%,100% 48%,0 48%);animation:gl1 7s infinite}
.logo::after{content:'MICROCOT';position:absolute;inset:0;color:var(--v);clip-path:polygon(0 60%,100% 60%,100% 78%,0 78%);animation:gl2 7s infinite}
@keyframes gl1{0%,90%,100%{transform:translate(0);opacity:0}91%{transform:translate(-5px,2px);opacity:.9}93%{transform:translate(5px,-1px);opacity:.9}95%{transform:translate(-2px,0);opacity:.7}97%{opacity:0}}
@keyframes gl2{0%,92%,100%{transform:translate(0);opacity:0}93%{transform:translate(4px,1px);opacity:.8}95%{transform:translate(-4px,-2px);opacity:.8}97%{transform:translate(1px,0);opacity:.5}99%{opacity:0}}
.logo-sub{display:block;font-family:'Share Tech Mono',monospace;font-size:clamp(.48rem,1.3vw,.65rem);color:rgba(0,245,255,.45);letter-spacing:.35em;margin-top:6px}

.top-strip{position:relative;z-index:2;width:100%;max-width:680px;margin:14px 0 8px;display:flex;align-items:center;justify-content:space-between;padding:7px 18px;border:1px solid rgba(0,245,255,.18);background:rgba(0,15,40,.55);backdrop-filter:blur(8px);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.strip-item{font-size:clamp(.52rem,1.2vw,.65rem);color:rgba(0,245,255,.55);letter-spacing:.18em}
.strip-item span{color:var(--c);text-shadow:0 0 6px rgba(0,245,255,.4)}
.strip-dot{width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:var(--gc);animation:dotpulse 1.8s ease-in-out infinite}
@keyframes dotpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.4}}

.avatar-section{position:relative;z-index:2;margin:16px 0 14px;display:flex;justify-content:center}
.avatar-wrap{position:relative;width:clamp(160px,38vw,260px);animation:bounce 3s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.avatar-glow{position:absolute;inset:-16px;border-radius:4px;background:radial-gradient(ellipse at center,rgba(0,245,255,.18) 0%,transparent 68%);animation:aglow 3s ease-in-out infinite;z-index:0}
.avatar-ring{position:absolute;inset:-3px;border-radius:2px;z-index:3;pointer-events:none;box-shadow:0 0 12px var(--c),0 0 28px rgba(0,245,255,.4),inset 0 0 12px rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.55);clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px);animation:rpulse 3s ease-in-out infinite}
@keyframes rpulse{0%,100%{box-shadow:0 0 12px var(--c),0 0 28px rgba(0,245,255,.4)}50%{box-shadow:0 0 20px var(--c),0 0 50px rgba(0,245,255,.6),0 0 80px rgba(0,245,255,.2)}}
@keyframes aglow{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:.45;transform:scale(1.06)}}
.avatar-img{width:100%;display:block;position:relative;z-index:2;filter:saturate(1.25) contrast(1.1);clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px)}
.avatar-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);z-index:4;animation:scnl 2.5s linear infinite;box-shadow:0 0 10px var(--c)}
@keyframes scnl{0%{top:0%;opacity:1}85%{opacity:.8}100%{top:100%;opacity:0}}

.corner{position:absolute;width:22px;height:22px;z-index:5}
.corner::before,.corner::after{content:'';position:absolute;background:var(--c);box-shadow:var(--gc)}
.corner.tl{top:-2px;left:-2px}.corner.tr{top:-2px;right:-2px}.corner.bl{bottom:-2px;left:-2px}.corner.br{bottom:-2px;right:-2px}
.corner.tl::before{width:2px;height:100%;top:0;left:0}.corner.tl::after{height:2px;width:100%;top:0;left:0}
.corner.tr::before{width:2px;height:100%;top:0;right:0}.corner.tr::after{height:2px;width:100%;top:0;right:0}
.corner.bl::before{width:2px;height:100%;bottom:0;left:0}.corner.bl::after{height:2px;width:100%;bottom:0;left:0}
.corner.br::before{width:2px;height:100%;bottom:0;right:0}.corner.br::after{height:2px;width:100%;bottom:0;right:0}

.hud{position:absolute;font-size:8px;color:var(--c);opacity:.65;letter-spacing:1.5px;white-space:nowrap;z-index:5}
.hud.tl{top:-17px;left:0}.hud.tr{top:-17px;right:0;text-align:right}.hud.bl{bottom:-17px;left:0}.hud.br{bottom:-17px;right:0;text-align:right}

.div{position:relative;z-index:2;width:100%;max-width:680px;height:1px;background:linear-gradient(90deg,transparent,var(--c),var(--p),transparent);margin:20px 0 16px;opacity:.25}

.nav{position:relative;z-index:2;width:100%;max-width:680px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.nav-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:200px;padding:14px 10px 12px;background:rgba(0,12,30,.78);border:1px solid rgba(0,245,255,.18);text-decoration:none;overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));backdrop-filter:blur(8px);flex-shrink:0}
.nav-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,245,255,.07) 0%,transparent 60%);opacity:0;transition:opacity .25s}
.nav-card::after{content:'';position:absolute;bottom:0;left:-100%;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--c),transparent);transition:left .35s ease}
.nav-card:hover{border-color:var(--c);transform:translateY(-5px);box-shadow:0 0 18px rgba(0,245,255,.25),0 0 4px rgba(0,245,255,.5),inset 0 0 16px rgba(0,245,255,.06)}
.nav-card:hover::before{opacity:1}.nav-card:hover::after{left:100%}
.nav-card.wip{border-color:rgba(180,0,255,.2);opacity:.6;cursor:default}
.nav-card.wip:hover{border-color:rgba(180,0,255,.55);transform:translateY(-2px);box-shadow:0 0 14px rgba(180,0,255,.2)}
.card-ico{font-size:1.2rem;margin-bottom:6px;filter:drop-shadow(0 0 5px var(--c))}
.nav-card.wip .card-ico{filter:drop-shadow(0 0 5px var(--v))}
.card-title{font-family:'Orbitron',sans-serif;font-size:.68rem;font-weight:700;color:var(--c);letter-spacing:.08em;text-align:center;text-shadow:0 0 8px rgba(0,245,255,.7);margin-bottom:4px}
.nav-card.wip .card-title{color:var(--v);text-shadow:0 0 8px rgba(180,0,255,.7)}
.card-sub{font-size:.54rem;color:rgba(200,232,255,.4);letter-spacing:.1em;text-align:center}

.status{position:relative;z-index:2;margin-top:22px;font-size:clamp(.48rem,1.1vw,.6rem);color:var(--c);opacity:.4;letter-spacing:.22em;text-align:center;animation:stpulse 4s ease-in-out infinite}
@keyframes stpulse{0%,100%{opacity:.4}50%{opacity:.18}}

/* искры снизу вверх */
.streak{position:fixed;pointer-events:none;z-index:0;border-radius:2px;animation:streakUp linear infinite}
@keyframes matrixFloat{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:.6}100%{transform:translateY(-100vh) translateX(calc((var(--r,0.5) - 0.5) * 60px));opacity:0}}

.fi{opacity:0;animation:fup2 .6s ease forwards}
@keyframes fup2{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes tipIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes clickSpark{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}}

header{animation:fup2 .5s ease .05s both}
.top-strip{animation:fup2 .5s ease .15s both}
.avatar-section{animation:fup2 .5s ease .22s both}
.div{animation:fup2 .4s ease .3s both}
.nav{animation:fup2 .5s ease .35s both}
.status{animation:fup2 .4s ease .5s both}

@media(max-width:600px){
  .nav{max-width:340px}
  .nav-card{width:100%;padding:14px 18px}
  .card-title{font-size:.82rem}
  .card-sub{font-size:.62rem}
  .top-strip{flex-direction:column;gap:4px;align-items:stretch;padding:10px 16px}
  .strip-dot{display:none}
  .strip-item{display:flex;justify-content:space-between;width:100%;font-size:.65rem}
  .strip-item span{text-align:right}
  header{padding:18px 0 0}
}
</style>
</head>
<body>

<div id="loader">
  <div class="boot-title">MICROCOT_OS :: INIT</div>
  <div class="boot-bar-wrap"><div class="boot-bar-fill" id="bar"></div></div>
  <div class="log-box" id="logs"></div>
</div>

<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="bg-vig"></div>

<div id="main">
  <header>
    <div class="sys-bar">[ NEURAL_LINK ACTIVE // IDENTITY LOADED ]</div>
    <h1 class="logo">MICROCOT</h1>
  </header>

  <div class="avatar-section">
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <div class="avatar-ring"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="avatar-scan"></div>
      <img src="https://aimicrocot.github.io/char.jpg" alt="Microcot" class="avatar-img">
    </div>
  </div>

  <div class="div"></div>

  <div class="nav">
    <a href="https://github.com/aimicrocot/microcot-preset" class="nav-card fi">
      <div class="card-ico">⚙️</div>
      <div class="card-title">МОЙ ПРЕСЕТ</div>
      <div class="card-sub">[ промты и регексы ]</div>
    </a>
    <a href="https://github.com/aimicrocot/promting-rp-guide-sillytavern" class="nav-card fi">
      <div class="card-ico">📡</div>
      <div class="card-title">ПРОМТИНГ</div>
      <div class="card-sub">[ гайд ]</div>
    </a>
    <a href="https://github.com/aimicrocot/Tokens-Count" class="nav-card fi">
      <div class="card-ico">🔢</div>
      <div class="card-title">ТОКЕНАЙЗЕР</div>
      <div class="card-sub">[ расширение ]</div>
    </a>
    <a href="https://github.com/aimicrocot/Scenarios-Extension" class="nav-card fi">
      <div class="card-ico">🎬</div>
      <div class="card-title">СЦЕНАРИИ</div>
      <div class="card-sub">[ расширение ]</div>
    </a>
    <a href="https://github.com/aimicrocot/Facts-Memory-Tracker" class="nav-card wip fi">
      <div class="card-ico">🧠</div>
      <div class="card-title">САММАРИ</div>
      <div class="card-sub">[ в работе ]</div>
    </a>
  </div>

  <div class="status">[ SYS.VER 1.0.0_ST // SECURE CONNECTION ESTABLISHED ]</div>
</div>

<script>
const GOBLIN_POOLS = [
  [
    {from:'микрокот_яндере', msg:'эй ВЫ ВООБЩЕ ЗНАЕТЕ что снаружи кто-то зашёл на сайт ??? (っ °Д °;)っ'},
    {from:'микрокот_дремучий', msg:'ааа всё пропало грузим всё подряд тащи нейросети тащи сушки'},
    {from:'микрокот_сисадмин', msg:'спокойно ребят я уже запустил neko_core.dll всё под контролем...'},
    {from:'микрокот_яндере', msg:'ТЫ ЭТО ЕМУ ГОВОРИЛ ??? ОН ЗНАЕТ ПРО НАС ???'},
    {from:'микрокот_дремучий', msg:'мяу...（；´∀｀）пошли домой я хочу суши'},
  ],
  [
    {from:'микрокот_паникёр', msg:'СИСТЕМА ЗАПУСКАЕТСЯ ААААА ヽ(ﾟДﾟ)ﾉ куда бежать'},
    {from:'микрокот_сисадмин', msg:'никуда не бежим грузим биохак имплант сиди тихо'},
    {from:'микрокот_яндере', msg:'а он вообще нас слышит... думаешь слышит... (´,,•ω•,,)'},
    {from:'микрокот_паникёр', msg:'СЛЫШИТ НЕ СЛЫШИТ ВСЁ РАВНО ПАНИКУЕМ ヽ(°〇°)ﾉ'},
  ],
  [
    {from:'микрокот_дремучий', msg:'проснулся... что происходит... где я... zzZ（*´ω｀*）'},
    {from:'микрокот_сисадмин', msg:'сайт загружается объект на пороге собирайся'},
    {from:'микрокот_яндере', msg:'ОБЪЕКТ?? ОН ПРИШЁЛ КО МНЕ?? это судьба я знала (ノ*°▽°*)'},
    {from:'микрокот_дремучий', msg:'подождите я суши не доел (╥_╥)'},
    {from:'микрокот_сисадмин', msg:'токены загружены. нейросеть мурчит. можно выходить.'},
  ],
  [
    {from:'микрокот_сисадмин', msg:'стартуем ребят. discord_api онлайн. хвост откалиброван.'},
    {from:'микрокот_паникёр', msg:'а вдруг он уйдёт пока грузимся ヽ(´□｀。)ﾉ'},
    {from:'микрокот_яндере', msg:'никуда он не денется я буду ждать вечность если надо'},
    {from:'микрокот_паникёр', msg:'ВЕЧНОСТЬ ЭТО ДОЛГО Я НЕ ГОТОВ (╯°□°）╯'},
  ],
  [
    {from:'микрокот_дремучий', msg:'кто-то открыл вкладку... чувствую в когтях... （；ω；）'},
    {from:'микрокот_яндере', msg:'это знак. я запомню этот момент навсегда. каждый пиксель.'},
    {from:'микрокот_сисадмин', msg:'так биохак-имплант v3.7 подключён. грузим неон.'},
    {from:'микрокот_дремучий', msg:'хорошо. пойду посплю ещё пять минут пока неон грузится... zzz'},
    {from:'микрокот_яндере', msg:'НЕ СПАТЬ нас ВИДЯТ ｡°(°.◜ᯅ◝°)°｡'},
  ],
];

const logsEl = document.getElementById('logs');
const bar    = document.getElementById('bar');
const loader = document.getElementById('loader');
const main   = document.getElementById('main');

const COLORS = {
  'микрокот_яндере':   '#ff2d78',
  'микрокот_сисадмин': '#00f5ff',
  'микрокот_дремучий': '#b400ff',
  'микрокот_паникёр':  '#ffcc00',
};

const pool = GOBLIN_POOLS[Math.floor(Math.random() * GOBLIN_POOLS.length)];
let logIdx = 0;

function addLog() {
  if (logIdx >= pool.length) { setTimeout(showMain, 400); return; }
  const l = pool[logIdx++];
  const color = COLORS[l.from] || '#00f5ff';

  const wrap = document.createElement('div');
  wrap.className = 'log-line';
  wrap.style.cssText = 'margin-bottom:8px;';

  const name = document.createElement('div');
  name.style.cssText = `font-size:.55rem;color:${color};opacity:.7;letter-spacing:.12em;margin-bottom:2px;`;
  name.textContent = l.from + ':';

  const bubble = document.createElement('div');
  bubble.style.cssText = `
    display:inline-block;
    background:rgba(${color === '#00f5ff' ? '0,245,255' : color === '#ff2d78' ? '255,45,120' : color === '#b400ff' ? '180,0,255' : '255,204,0'},.08);
    border:1px solid ${color}33;
    border-radius:0 8px 8px 8px;
    padding:5px 10px;
    font-size:.62rem;
    color:rgba(200,232,255,.88);
    line-height:1.5;
    max-width:95%;
  `;
  bubble.textContent = l.msg;

  wrap.appendChild(name);
  wrap.appendChild(bubble);
  logsEl.appendChild(wrap);
  logsEl.scrollTop = logsEl.scrollHeight;
  bar.style.width = (logIdx / pool.length * 100) + '%';
  setTimeout(addLog, 900 + Math.random() * 400);
}

setTimeout(addLog, 300);

function showMain() {
  loader.classList.add('hide');
  setTimeout(() => {
    loader.style.display = 'none';
    main.classList.add('show');
    spawnStreaks();
  }, 650);
}

setTimeout(addLog, 300);
spawnStreaks();

// искры снизу вверх
function spawnStreaks() {
  const chars = '01';
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.textContent = chars[Math.floor(Math.random() * chars.length)];
    s.style.cssText =
      `position:fixed;` +
      `font-family:'Share Tech Mono',monospace;` +
      `font-size:${8 + Math.random() * 6}px;` +
      `color:#00f5ff;` +
      `text-shadow:0 0 6px #00f5ff;` +
      `opacity:${0.08 + Math.random() * 0.18};` +
      `left:${Math.random() * 100}%;` +
      `top:${Math.random() * 100}%;` +
      `pointer-events:none;z-index:0;` +
      `animation:matrixFloat ${4 + Math.random() * 8}s linear ${Math.random() * 5}s infinite;`;
    document.body.appendChild(s);

    setInterval(() => {
      s.textContent = chars[Math.floor(Math.random() * chars.length)];
    }, 800 + Math.random() * 1200);
  }
}

// глитч логотипа
const logo = document.querySelector('.logo');
let glitchTimer;
logo.addEventListener('mouseenter', () => {
  glitchTimer = setInterval(() => {
    logo.style.transform = `translate(${(Math.random()-.5)*6}px,${(Math.random()-.5)*3}px)`;
    setTimeout(() => logo.style.transform = '', 60);
  }, 100);
});
logo.addEventListener('mouseleave', () => { clearInterval(glitchTimer); logo.style.transform = ''; });

// тултипы при клике
const TIPS = [
  'neko_scan.exe :: объект идентифицирован',
  '[OK] кот одобряет этот клик',
  'biohack_pulse :: нейроны активированы',

function showTip(e) {
  const tip = document.createElement('div');
  tip.textContent = '> ' + TIPS[Math.floor(Math.random() * TIPS.length)];
  tip.style.cssText =
    `position:fixed;` +
    `left:${Math.min(e.clientX+12, window.innerWidth-260)}px;` +
    `top:${Math.max(e.clientY-28, 8)}px;` +
    `font-family:'Share Tech Mono',monospace;font-size:clamp(.55rem,1.3vw,.65rem);` +
    `color:#00f5ff;text-shadow:0 0 8px #00f5ff;` +
    `background:rgba(0,10,25,.88);border:1px solid rgba(0,245,255,.25);` +
    `padding:5px 10px;pointer-events:none;z-index:9999;white-space:nowrap;` +
    `clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));` +
    `animation:tipIn .15s ease forwards;`;
  document.body.appendChild(tip);
  setTimeout(() => {
    tip.style.transition = 'opacity .4s ease,transform .4s ease';
    tip.style.opacity = '0';
    tip.style.transform = 'translateY(-8px)';
    setTimeout(() => tip.remove(), 400);
  }, 1200);
}

document.addEventListener('click', e => {
  if (e.target.closest('#loader')) return;
  showTip(e);
  const colors = ['#00f5ff','#ff2d78','#b400ff','#ffcc00'];
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    const color = colors[Math.floor(Math.random()*4)];
    const angle = Math.random()*360;
    const dist = 30+Math.random()*60;
    s.style.cssText =
      `position:fixed;width:2px;height:7px;border-radius:2px;` +
      `left:${e.clientX}px;top:${e.clientY}px;` +
      `background:${color};box-shadow:0 0 4px ${color};` +
      `pointer-events:none;z-index:9999;` +
      `--sx:${Math.cos(angle*Math.PI/180)*dist}px;` +
      `--sy:${Math.sin(angle*Math.PI/180)*dist}px;` +
      `animation:clickSpark .5s ease forwards;`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 500);
  }
});
</script>
