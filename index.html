<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cyberspace_haru! // киберпанк-сайт</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
<style>
/* CSS СБРОС */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: #010101; /* Очень глубокий чёрный */
  color: #c0c0c0; /* Светло-серый текст */
  font-family: 'Exo 2', sans-serif;
  overflow: hidden; /* Чтобы фон не скроллился */
}

/* КИБЕРПАНК ФОН */
.cyber-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -2;
  /* Градиент для затемнения и цифрового зерна */
  background-color: #010101;
}

/* ЭФФЕКТ МАТРИЧНОГО ДОЖДЯ */
.cyber-bg::after {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image: linear-gradient(0deg, rgba(0, 225, 255, 0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0, 225, 255, 0.05) 1px, transparent 1px);
  background-size: 50px 50px; /* Размер сетки */
  opacity: 0.1;
  animation: bg-grid 60s infinite linear;
}

@keyframes bg-grid {
  0% { background-position: 0 0; }
  100% { background-position: 50px 50px; }
}

/* ДЕКОРАТИВНЫЕ НЕОНОВЫЕ СЕРДЦА И ЗВЁЗДЫ */
.decorations {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
}
.deco {
  position: absolute;
  color: #00e1ff; /* Неоново-голубой */
  text-shadow: 0 0 10px #00e1ff;
  font-size: 2rem;
  opacity: 0.2;
}
#deco1 { top: 10%; left: 5%; animation: pulse 2s infinite ease-in-out; } /* Звезда */
#deco2 { top: 20%; right: 10%; animation: pulse 3s infinite ease-in-out 1s; } /* Сердце */
#deco3 { bottom: 15%; left: 8%; animation: pulse 2.5s infinite ease-in-out 0.5s; } /* Звезда */
#deco4 { bottom: 25%; right: 5%; animation: pulse 3.5s infinite ease-in-out 1.5s; } /* Сердце */

/* ШАПКА */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 5%;
  background: rgba(0,0,0,0.8);
  border-bottom: 2px solid #00e1ff;
  box-shadow: 0 0 20px rgba(0,225,255,0.5);
  position: fixed;
  top: 0; left: 0; width: 100%;
  z-index: 10;
}
.logo {
  color: #00e1ff;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: bold;
  text-shadow: 0 0 10px #00e1ff, 0 0 20px #a000ff; /* Свечение */
  cursor: pointer;
  animation: glitch 3s infinite;
}
nav ul {
  display: flex;
  list-style: none;
}
nav ul li {
  margin-left: 25px;
}
nav ul li a {
  color: #c0c0c0;
  text-decoration: none;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  transition: color 0.3s ease, text-shadow 0.
