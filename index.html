<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Micro Cot</title>
<style>
  body {
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  img {
    display: block;
    margin-left: auto;
    margin-right: auto;
    width: 40%;
    
    /* Настройки неоновой обводки */
    border-radius: 20px; /* Скругление углов */
    border: 3px solid #00fbff; /* Цвет самой линии */
    
    /* Эффект свечения: внешнее и внутреннее */
    box-shadow: 0 0 15px #00fbff, 
                0 0 30px #00fbff, 
                inset 0 0 10px #00fbff;
    
    /* Анимация пульсации для красоты */
    animation: neon-glow 2s infinite alternate;
  }

  @keyframes neon-glow {
    from {
      box-shadow: 0 0 10px #00fbff, 0 0 20px #00fbff, inset 0 0 5px #00fbff;
    }
    to {
      box-shadow: 0 0 25px #00fbff, 0 0 50px #00fbff, inset 0 0 15px #00fbff;
    }
  }
</style>
</head>
<body>

<img src="char.jpg" alt="Character">

</body>
</html>
