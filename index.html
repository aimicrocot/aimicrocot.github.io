<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICROCOT // TERMINAL</title>
    <style>
        /* Основные настройки страницы */
        body {
            margin: 0;
            padding: 0;
            background-image: url('bg.jpg'); /* Путь к фону */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Затемнение фона, чтобы текст читался лучше */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        /* Заголовок */
        h1 {
            text-align: center;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 5px;
            margin-top: 40px;
        }

        /* Контейнер для аватара */
        .avatar-container {
            margin: 20px 0;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px #00ffff;
            line-height: 0;
        }

        .avatar-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
        }

        /* Сетка с кнопками */
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
            margin-top: 30px;
            padding: 20px;
        }

        /* Стиль кнопок-карточек */
        .card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ffff;
            padding: 15px;
            width: 250px;
            text-align: center;
            text-decoration: none;
            color: #00ffff;
            transition: 0.3s;
            box-shadow: inset 0 0 5px #00ffff;
        }

        .card:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
            cursor: pointer;
        }

        .card-title {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .card-desc {
            font-size: 0.8em;
            opacity: 0.8;
        }

        /* Подвал (футер) */
        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.7em;
            letter-spacing: 2px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <h1>MICROCOT // TERMINAL</h1>

    <div class="avatar-container">
        <img src="char.jpg" alt="Microcot Avatar" class="avatar-img">
    </div>

    <div class="grid-container">
        <a href="https://github.com/aimicrocot" class="card">
            <span class="card-title">ПРЕСЕТ</span>
            <span class="card-desc">[ github.com/aimicrocot ]</span>
        </a>

        <a href="#" class="card">
            <span class="card-title">ПРОМТИНГ ГАЙД</span>
            <span class="card-desc">[ RP Guide SillyTavern ]</span>
        </a>

        <a href="#" class="card">
            <span class="card-title">РАСШИРЕНИЕ: ТОКЕНЫ</span>
            <span class="card-desc">[ Tokens-Count ]</span>
        </a>

        <a href="#" class="card">
            <span class="card-title">РАСШИРЕНИЕ: СЦЕНАРИИ</span>
            <span class="card-desc">[ Scenarios-Extension ]</span>
        </a>

        <a href="#" class="card">
            <span class="card-title">MEMORY TRACKER</span>
            <span class="card-desc">[ Facts-Memory-Tracker ]</span>
        </a>
    </div>

    <div class="footer">
        SYS.VER 1.0.0_ST // SECURE CONNECTION ESTABLISHED
    </div>

</body>
</html>
